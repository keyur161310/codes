<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cricket Scoreboard - Bootstrap 5</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous">

  <style>
    /* Minimal style - only to make buttons round & same size */
    .run-btn {
      width: 2.4rem;
      height: 2.4rem;
      padding: 0;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 50% !important;
      line-height: 2.4rem;
      margin: 0 4px;
    }
  </style>
</head>
<body class="bg-light py-4">

  <div class="container">

    <!-- Batsmen section -->
    <div class="row g-3 mb-4">
      
      <!-- Batsman 1 -->
      <div class="col-12 col-lg-6">
        <div class="border border-success rounded-3 p-3 bg-white shadow-sm">
          <div class="d-flex justify-content-between border-bottom border-success-subtle pb-2 mb-3">
            <div class="fw-bold fs-5 text-success">Player name</div>
            <div>
              <span class="badge text-bg-success rounded-pill px-3 py-2">4s = 0</span>
              <span class="badge text-bg-warning rounded-pill px-3 py-2 ms-2">6s = 0</span>
            </div>
          </div>
          
          <div class="d-flex justify-content-between align-items-center">
            <div class="border border-success-subtle rounded p-2 bg-success-subtle text-success-emphasis">
              <strong>Total:</strong> 0<br>
              <strong>Ball:</strong> 0<br>
              <strong>NRR:</strong> 0.00
            </div>
            
            <div class="text-center">
              <div class="mb-2 fw-bold text-muted">Runs on balls</div>
              <div>
                <button type="button" class="btn btn-outline-secondary run-btn">0</button>
                <button type="button" class="btn btn-outline-secondary run-btn">1</button>
                <button type="button" class="btn btn-outline-secondary run-btn">2</button>                
                <button type="button" class="btn btn-outline-secondary run-btn">3</button>
                <button type="button" class="btn btn-outline-secondary run-btn">4</button>
                <button type="button" class="btn btn-outline-secondary run-btn">5</button>
                <button type="button" class="btn btn-outline-secondary run-btn">6</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Batsman 2 -->
      <div class="col-12 col-lg-6">
        <div class="border border-success rounded-3 p-3 bg-white shadow-sm">
          <div class="d-flex justify-content-between border-bottom border-success-subtle pb-2 mb-3">
            <div class="fw-bold fs-5 text-success">Player name</div>
            <div>
              <span class="badge text-bg-success rounded-pill px-3 py-2">4s = 0</span>
              <span class="badge text-bg-warning rounded-pill px-3 py-2 ms-2">6s = 0</span>
            </div>
          </div>
          
          <div class="d-flex justify-content-between align-items-center">
            <div class="border border-success-subtle rounded p-2 bg-success-subtle text-success-emphasis">
              <strong>Total:</strong> 0<br>
              <strong>Ball:</strong> 0<br>
              <strong>NRR:</strong> 0.00
            </div>
            
            <div class="text-center">
              <div class="mb-2 fw-bold text-muted">Runs on balls</div>
              <div>
                <button type="button" class="btn btn-outline-secondary run-btn">0</button>
                <button type="button" class="btn btn-outline-secondary run-btn">1</button>
                <button type="button" class="btn btn-outline-secondary run-btn">2</button>
                <button type="button" class="btn btn-outline-secondary run-btn">3</button>
                <button type="button" class="btn btn-outline-secondary run-btn">4</button>
                <button type="button" class="btn btn-outline-secondary run-btn">5</button>
                <button type="button" class="btn btn-outline-secondary run-btn">6</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    
    </div><!-- row batsmen -->

    <!-- Bowler section -->
    <div class="row">
      <div class="col-12">
        <div class="border border-danger rounded-3 p-3 bg-white shadow-sm">
          <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div class="fw-bold fs-5 text-danger">Bowler name</div>
            
            <div class="d-flex gap-4 flex-wrap">
              <span class="badge text-bg-info px-3 py-2">Total over: 0.0</span>
              <span class="badge text-bg-secondary px-3 py-2">NRR: 0.00</span>
              <span class="badge text-bg-danger px-3 py-2">Wickets=Runs(Balls): 0-00 (00)</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- container -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
</body>
</html>
